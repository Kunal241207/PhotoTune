<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageEditor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="theme.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section>
            <div class="left">
                <div class="top">
                    <label for="image-inp" class="btn">
                        Choose Image
                        <input type="file" id="image-inp" accept="image/*" hidden>
                    </label>
                    <button class="btn" id="reset-btn">Reset</button>
                    <button class="btn" id="crop-btn">Crop</button>
                    <button class="btn" id="apply-crop-btn" style="display: none;">Apply</button>
                    <button class="btn" id="download-btn">Download</button>
                </div>
                <div class="bottom">
                    <div class="placeholder">
                        <i class="fa-regular fa-image"></i>
                        <p>No Image Chosen</p>
                    </div>
                    <div class="drop-overlay">
                        <i class="fa-solid fa-image"></i>
                        <p>Drop image here</p>
                    </div>
                    <canvas id="image-canvas"></canvas>
                    <div id="crop-box">
                        <div class="handle nw"></div>
                        <div class="handle ne"></div>
                        <div class="handle sw"></div>
                        <div class="handle se"></div>
                    </div>
                </div>
            </div>

            <div class="right">
                <h2>Filters</h2>
                <div class="filter-options">
                    <div class="filters">
                    </div>
                </div>
                <h2>Presets</h2>
                <div class="presets"></div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
